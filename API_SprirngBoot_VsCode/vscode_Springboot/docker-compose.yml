version: '3.9'

services:
  produto-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: produto-api-container
    ports:
      - "8088:8088"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/produtos/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - produto-network
    volumes:
      - ./logs:/app/logs

networks:
  produto-network:
    driver: bridge

volumes:
  logs:
    driver: local
